
services:
  web:
    build: .
    ports:
      - "3000:3000"
    environment:
      - MONGODB_CONNECT=mongodb://mongo:27017/hackerchat
      - JWT_KEY=supersecretkey_change_me_in_production
      - NEXT_PUBLIC_AUTH_CONNECT=http://localhost:3000
      - NEXT_PUBLIC_WEBSOCKET_CONNECT=ws://localhost:8080
    depends_on:
      - mongo
      - websocket

  websocket:
    build: ./ws-server
    ports:
      - "8080:8080"
    environment:
      - WS_PORT=8080

  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data:
